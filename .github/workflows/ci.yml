name: CI

'on':
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - '3.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Compile sources
        run: python -m compileall -q sto_crm.py sto_crm tests

      - name: Check frontend JavaScript syntax
        run: node --check sto_crm/assets/app.js

      - name: Run pytest with coverage
        run: python -m coverage run -m pytest -q

      - name: Report coverage
        run: python -m coverage report --fail-under=80

      - name: Check frontend contracts
        run: python tests/check_frontend_contracts.py

      - name: Run ruff
        run: python -m ruff check .

  package:
    name: Packaging payload check (Windows)
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Build release payload without exe smoke test
        shell: pwsh
        run: .\build.ps1 -SkipSmokeTest

      - name: Validate release payload files
        shell: pwsh
        run: |
          $allowed = @('STO_CRM.exe', 'STO_CRM.exe.sha256', 'latest.json')
          $unexpected = Get-ChildItem -LiteralPath .\release -File | Where-Object { $allowed -notcontains $_.Name }
          if ($unexpected) { throw "Unexpected release files: $($unexpected.Name -join ', ')" }
          foreach ($name in $allowed) {
            if (-not (Test-Path -LiteralPath (Join-Path '.\release' $name))) { throw "Missing release file: $name" }
          }
          $manifest = Get-Content .\release\latest.json -Raw | ConvertFrom-Json
          if ($manifest.asset.name -ne 'STO_CRM.exe') { throw 'Manifest asset name is invalid.' }
          if ([int64]$manifest.asset.size -ne (Get-Item .\release\STO_CRM.exe).Length) { throw 'Manifest asset size does not match STO_CRM.exe.' }
          if ($manifest.asset.sha256 -notmatch '^[0-9a-f]{64}$') { throw 'Manifest SHA-256 is invalid.' }
          $hash = (Get-FileHash -Algorithm SHA256 .\release\STO_CRM.exe).Hash.ToLowerInvariant()
          if ($manifest.asset.sha256 -ne $hash) { throw 'Manifest SHA-256 does not match STO_CRM.exe.' }
          if ($manifest.asset.download_url -notmatch '^https://github\.com/.+/releases/download/.+/STO_CRM\.exe$') { throw 'Manifest download URL is invalid.' }
