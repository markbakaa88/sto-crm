name: CI

'on':
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - '3.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Compile sources
        run: python -m compileall -q sto_crm.py sto_crm tests

      - name: Check frontend JavaScript syntax
        run: node --check sto_crm/assets/app.js

      - name: Run pytest with coverage
        run: python -m coverage run -m pytest -q

      - name: Report coverage
        run: python -m coverage report --fail-under=85

      - name: Check frontend contracts
        run: python tests/check_frontend_contracts.py

      - name: Run ruff
        run: python -m ruff check .

  package:
    name: Packaging payload check (Windows)
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Build release payload without exe smoke test
        shell: pwsh
        run: .\build.ps1 -SkipSmokeTest

      - name: Validate release payload files
        shell: pwsh
        run: |
          $required = @('STO_CRM.exe', 'STO_CRM.exe.sha256', 'latest.json')
          foreach ($name in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path '.\release' $name))) { throw "Missing release file: $name" }
          }
