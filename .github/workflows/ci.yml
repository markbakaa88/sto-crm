name: CI

'on':
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - '3.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Compile sources
        run: python -m compileall -q sto_crm.py sto_crm tests

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Run pytest
        run: python -m pytest -q

      - name: Run ruff
        run: python -m ruff check .

  package:
    name: Packaging payload check (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build release payload without exe smoke test
        shell: pwsh
        run: .\build.ps1 -SkipSmokeTest

      - name: Validate release payload files
        shell: pwsh
        run: |
          $required = @('STO_CRM.exe', 'STO_CRM.exe.sha256', 'latest.json')
          foreach ($name in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path '.\release' $name))) { throw "Missing release file: $name" }
          }
