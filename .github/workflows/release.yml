name: Build release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate tag matches APP_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $config = Get-Content .\sto_crm\config.py -Raw
          if ($config -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') { throw "APP_VERSION not found in sto_crm/config.py" }
          $appVersion = $Matches[1]
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($appVersion -ne $tagVersion) { throw "Tag $tagVersion does not match APP_VERSION $appVersion" }

      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -q

      - name: Run ruff
        run: python -m ruff check .

      - name: Build single-file executable
        shell: pwsh
        run: .\build.ps1

      - name: Validate release payload
        shell: pwsh
        run: |
          $allowed = @("STO_CRM.exe", "STO_CRM.exe.sha256", "latest.json")
          $unexpected = Get-ChildItem -LiteralPath .\release -File | Where-Object { $allowed -notcontains $_.Name }
          if ($unexpected) { throw "Unexpected release files: $($unexpected.Name -join ', ')" }
          $manifest = Get-Content .\release\latest.json -Raw | ConvertFrom-Json
          if ($manifest.asset.name -ne "STO_CRM.exe") { throw "Manifest asset name is invalid." }
          if ([int64]$manifest.asset.size -ne (Get-Item .\release\STO_CRM.exe).Length) { throw "Manifest asset size does not match STO_CRM.exe." }
          if ($manifest.asset.sha256 -notmatch '^[0-9a-f]{64}$') { throw "Manifest SHA-256 is invalid." }
          $hash = (Get-FileHash -Algorithm SHA256 .\release\STO_CRM.exe).Hash.ToLowerInvariant()
          if ($manifest.asset.sha256 -ne $hash) { throw "Manifest SHA-256 does not match STO_CRM.exe." }
          $expectedUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/STO_CRM.exe"
          if ("${{ github.ref }}" -like 'refs/tags/*' -and $manifest.asset.download_url -ne $expectedUrl) { throw "Manifest download URL must be $expectedUrl." }
          if ($manifest.asset.download_url -notmatch '^https://github\.com/.+/releases/download/.+/STO_CRM\.exe$') { throw "Manifest download URL is invalid." }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: STO_CRM-windows
          path: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
            release/latest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
            release/latest.json
          generate_release_notes: true
