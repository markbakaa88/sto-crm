name: Build release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate tag matches APP_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $config = Get-Content .\sto_crm\config.py -Raw
          if ($config -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') { throw "APP_VERSION not found in sto_crm/config.py" }
          $appVersion = $Matches[1]
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($appVersion -ne $tagVersion) { throw "Tag $tagVersion does not match APP_VERSION $appVersion" }

      - name: Build single-file executable
        shell: pwsh
        run: .\build.ps1

      - name: Calculate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 .\release\STO_CRM.exe).Hash.ToLowerInvariant()
          "$hash  STO_CRM.exe" | Set-Content -Encoding ASCII .\release\STO_CRM.exe.sha256

      - name: Generate update manifest
        shell: pwsh
        run: |
          $config = Get-Content .\sto_crm\config.py -Raw
          if ($config -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') { throw "APP_VERSION not found in sto_crm/config.py" }
          $version = $Matches[1]
          $tag = if ("${{ github.ref }}" -like 'refs/tags/*') { "${{ github.ref_name }}" } else { "v$version" }
          if ($tag -notmatch '^v') { $tag = "v$tag" }
          $exe = Get-Item .\release\STO_CRM.exe
          $hash = (Get-FileHash -Algorithm SHA256 $exe.FullName).Hash.ToLowerInvariant()
          $repo = "${{ github.repository }}"
          $manifest = [ordered]@{
            version = $version
            tag = $tag
            name = "СТО CRM $version"
            release_url = "https://github.com/$repo/releases/tag/$tag"
            asset = [ordered]@{
              name = "STO_CRM.exe"
              size = $exe.Length
              sha256 = $hash
              download_url = "https://github.com/$repo/releases/download/$tag/STO_CRM.exe"
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Encoding UTF8 .\release\latest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: STO_CRM-windows
          path: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
            release/latest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
            release/latest.json
          generate_release_notes: true
