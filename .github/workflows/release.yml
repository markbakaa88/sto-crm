name: Build release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Validate tag matches APP_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $appVersion = & python -c "from sto_crm.config import APP_VERSION; print(APP_VERSION)"
          if (-not $appVersion) { throw "APP_VERSION is empty in sto_crm/config.py" }
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($appVersion.Trim() -ne $tagVersion) { throw "Tag $tagVersion does not match APP_VERSION $appVersion" }

      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run pytest with coverage
        run: python -m coverage run -m pytest -q

      - name: Report coverage
        run: python -m coverage report --fail-under=85

      - name: Check frontend JavaScript syntax
        run: node --check sto_crm/assets/app.js

      - name: Check frontend contracts
        run: python tests/check_frontend_contracts.py

      - name: Run ruff
        run: python -m ruff check .

      - name: Build single-file executable
        shell: pwsh
        run: .\build.ps1

      - name: Validate release payload
        shell: pwsh
        run: |
          $allowed = @("STO_CRM.exe", "STO_CRM.exe.sha256", "latest.json")
          $unexpected = Get-ChildItem -LiteralPath .\release -File | Where-Object { $allowed -notcontains $_.Name }
          if ($unexpected) { throw "Unexpected release files: $($unexpected.Name -join ', ')" }
          $manifest = Get-Content .\release\latest.json -Raw | ConvertFrom-Json
          if ($manifest.asset.name -ne "STO_CRM.exe") { throw "Manifest asset name is invalid." }
          if ([int64]$manifest.asset.size -ne (Get-Item .\release\STO_CRM.exe).Length) { throw "Manifest asset size does not match STO_CRM.exe." }
          if ($manifest.asset.sha256 -notmatch '^[0-9a-f]{64}$') { throw "Manifest SHA-256 is invalid." }
          $hash = (Get-FileHash -Algorithm SHA256 .\release\STO_CRM.exe).Hash.ToLowerInvariant()
          if ($manifest.asset.sha256 -ne $hash) { throw "Manifest SHA-256 does not match STO_CRM.exe." }
          $expectedUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/STO_CRM.exe"
          if ("${{ github.ref }}" -like 'refs/tags/*' -and $manifest.asset.download_url -ne $expectedUrl) { throw "Manifest download URL must be $expectedUrl." }
          if ($manifest.asset.download_url -notmatch '^https://github\.com/.+/releases/download/.+/STO_CRM\.exe$') { throw "Manifest download URL is invalid." }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: STO_CRM-windows
          if-no-files-found: error
          retention-days: 30
          path: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
            release/latest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
            release/latest.json
          generate_release_notes: true
