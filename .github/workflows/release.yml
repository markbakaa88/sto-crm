name: Build release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build single-file executable
        shell: pwsh
        run: .\build.ps1 -SkipSmokeTest

      - name: Calculate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 .\release\STO_CRM.exe).Hash.ToLowerInvariant()
          "$hash  STO_CRM.exe" | Set-Content -Encoding ASCII .\release\STO_CRM.exe.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: STO_CRM-windows
          path: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/STO_CRM.exe
            release/STO_CRM.exe.sha256
          generate_release_notes: true
